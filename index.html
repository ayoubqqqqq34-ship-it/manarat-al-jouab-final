<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    
    <meta name="theme-color" content="#0a1628" />
    <meta name="description" content="تطبيق منارة مدينة جواب - دليلكم الشامل للخدمات، التكافل الاجتماعي، والأجواء الروحانية في مدينة جواب." />

    <meta property="og:title" content="منارة مدينة جواب" />
    <meta property="og:description" content="دليلك الشامل لمدينة جواب: خدمات، أخبار، وسوق الخير." />
    <meta property="og:image" content="/og-preview.jpg" />
    <meta property="og:type" content="website" />

    <title>منارة مدينة جواب</title>

    <style>
      /* شاشة تحميل بسيطة تظهر قبل تشغيل React */
      #initial-loader {
        position: fixed;
        inset: 0;
        background: #0a1628;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .loader-logo {
        width: 80px;
        height: 80px;
        border: 3px solid #d4a843;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div className="loader-logo"></div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // إخفاء شاشة التحميل بمجرد تحميل التطبيق
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
      });
    </script>
  </body>
</html>
